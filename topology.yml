name: library-demo-training

hosts:
  - name: ubuntu-server
    base_box:
      image: ubuntu-noble-x86_64
      man_user: ubuntu
    flavor: standard.small
    
  - name: signal-server
    base_box:
      image: Signal-Server
      man_user: ubuntu
    flavor: standard.small
    
  - name: windows-host
    base_box:
      image: Windows-Server-2022-PW
      man_user: Administrator
      mgmt_protocol: WINRM  # Important for Windows access
      connection_data:  # Additional WinRM settings
        ansible_winrm_transport: credssp
        ansible_winrm_server_cert_validation: ignore
    flavor: standard.small

routers:
  - name: firewall
    base_box:
      image: pfsense-netgate
      man_user: admin
    flavor: standard.small

networks:
  - name: server-network
    cidr: 192.168.20.0/24
    accessible_by_user: false  # Hidden from trainees
    
  - name: client-network
    cidr: 192.168.30.0/24
    accessible_by_user: true  # Trainees can access

net_mappings:
  - host: ubuntu-server
    network: server-network
    ip: 192.168.20.10
  - host: signal-server
    network: server-network
    ip: 192.168.20.20
  - host: windows-host
    network: client-network
    ip: 192.168.30.50

router_mappings:
  - router: firewall
    network: server-network
    ip: 192.168.20.1
  - router: firewall
    network: client-network
    ip: 192.168.30.1

# Optional: Add DNS configuration
dns:
  - network: client-network
    forwarders:
      - 8.8.8.8
      - 8.8.4.4