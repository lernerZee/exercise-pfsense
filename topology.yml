name: library-demo-training

hosts:
  - name: attacker
    base_box:
      image: kali-linux
      mgmt_user: kali
    flavor: standard.small
    
  - name: signal-server
    base_box:
      image: Signal-Server
      mgmt_user: ubuntu
    flavor: standard.small
    
  - name: ejabberd
    base_box:
      image: Ejabberd
      mgmt_user: ubuntu
    flavor: standard.small

routers:
  - name: firewall
    base_box:
      image: debian-12-x86_64
      mgmt_user: debian
    flavor: standard.small

networks:
  - name: server-network
    cidr: 192.168.20.0/24
    accessible_by_user: false
    
  - name: client-network
    cidr: 192.168.30.0/24
    accessible_by_user: true

net_mappings:
  - host: signal-server
    network: server-network
    ip: 192.168.20.20

  - host: ejabberd
    network: server-network
    ip: 192.168.20.30

  - host: attacker
    network: client-network
    ip: 192.168.30.50

router_mappings:
  - router: firewall
    network: server-network
    ip: 192.168.20.1

  - router: firewall
    network: client-network
    ip: 192.168.30.1

groups: []
