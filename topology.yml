name: library-demo-training

hosts:
  - name: ubuntu-server
    base_box:
      image: ubuntu-noble-x86_64
      mgmt_user: ubuntu
    flavor: standard.small
    
  - name: signal-server
    base_box:
      image: Signal-Server
      mgmt_user: ubuntu
    flavor: standard.small
    
  - name: windows-host
    base_box:
      image: Windows-Server-2022-PW
      mgmt_user: Administrator
      mgmt_protocol: WINRM
    flavor: standard.small

routers:
  - name: firewall
    base_box:
      image: pfsense-2.8
      mgmt_user: admin
    flavor: standard.small

networks:
  - name: server-network
    cidr: 192.168.20.0/24
    accessible_by_user: false
    
  - name: client-network
    cidr: 192.168.30.0/24
    accessible_by_user: true

net_mappings:
  - host: ubuntu-server
    network: server-network
    ip: 192.168.20.10
  - host: signal-server
    network: server-network
    ip: 192.168.20.20
  - host: windows-host
    network: client-network
    ip: 192.168.30.50

router_mappings:
  - router: firewall
    network: server-network
    ip: 192.168.20.1
  - router: firewall
    network: client-network
    ip: 192.168.30.1

# groups can be added if needed
groups: []